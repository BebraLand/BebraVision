<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Twitch Player</title>

  <style>
    :root {
      --bg: #0e0e10;
      --panel: #18181b;
      --line: #2f2f35;
      --text: #efeff1;
      --muted: #adadb8;
      --purple: #9147ff;
      --purple2: #772ce8;
      --red: #eb0400;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    #root {
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    body.blank-mode {
      background: transparent !important;
    }

    body.blank-mode #root {
      display: none !important;
    }

    body.blank-mode,
    body.blank-mode html {
      background-color: transparent !important;
      background-image: none !important;
    }

    #topbar {
      height: 58px;
      flex: 0 0 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: rgba(24, 24, 27, 0.96);
      border-bottom: 1px solid var(--line);
      z-index: 40;
      position: relative;
    }

    #topbar.hidden {
      display: none;
    }

    #channel-avatar {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: var(--purple);
      background-size: cover;
      background-position: center;
      flex: 0 0 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      overflow: hidden;
    }

    #meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #name-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
    }

    #channel-name {
      font-size: 15px;
      line-height: 18px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1 1 0;
      min-width: 0;
    }

    #status-pill {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 3px;
      flex-shrink: 0;
      background: #34343a;
      color: #d7d7dd;
      font-size: 10px;
      line-height: 18px;
      font-weight: 800;
      letter-spacing: .35px;
      text-transform: uppercase;
      flex: 0 0 auto;
    }

    #status-pill.live {
      background: var(--red);
      color: #fff;
    }

    #channel-sub {
      font-size: 13px;
      line-height: 16px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    #topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    #viewer-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    #open-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 30px;
      padding: 0 12px;
      background: var(--purple);
      color: #fff;
      border: 0;
      border-radius: 4px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    #open-btn:hover {
      background: var(--purple2);
    }

    #player-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
      overflow: hidden;
    }

    #vid {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
      /* Prevent scroll/wheel from seeking the timeline in FancyMenu */
      pointer-events: none;
    }

    #click-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.28);
      cursor: pointer;
      transition: opacity .18s ease;
      z-index: 5;
    }

    #click-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #big-play {
      width: 78px;
      height: 78px;
      border-radius: 999px;
      background: rgba(145, 71, 255, .92);
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
      transition: transform .14s ease, background .14s ease;
    }

    #big-play:hover {
      transform: scale(1.06);
      background: var(--purple2);
    }

    #big-play svg {
      width: 34px;
      height: 34px;
      fill: #fff;
      margin-left: 5px;
    }

    #controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58px;
      padding: 12px 18px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,.90));
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 10;
    }

    #controls.hidden {
      display: none;
    }

    #player-wrap:hover #controls,
    #controls.force {
      opacity: 1;
      transform: translateY(0);
    }

    .ctrl-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .ctrl-btn:hover {
      color: #bf94ff;
    }

    .ctrl-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      stroke: currentColor;
    }

    #vol-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #vol-slider {
      width: 82px;
      height: 4px;
      accent-color: #bf94ff;
      cursor: pointer;
    }

    #live-badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 7px;
      border-radius: 3px;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      line-height: 18px;
      font-weight: 900;
      letter-spacing: .35px;
      text-transform: uppercase;
    }

    #live-badge.offline {
      background: #44444b;
      color: #d7d7dd;
    }

    #spacer {
      flex: 1;
    }

    #quality-wrap {
      position: relative;
    }

    #quality-btn {
      width: auto;
      min-width: 74px;
      padding: 0 8px;
      font-size: 13px;
      font-weight: 800;
    }

    #quality-menu {
      display: none;
      position: absolute;
      right: 0;
      bottom: 38px;
      min-width: 150px;
      max-height: 280px;
      overflow: auto;
      background: #18181b;
      border: 1px solid #3a3a40;
      border-radius: 8px;
      padding: 5px;
      box-shadow: 0 16px 50px rgba(0,0,0,.5);
      z-index: 50;
    }

    #quality-menu.open {
      display: block;
    }

    .q-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 5px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      white-space: nowrap;
    }

    .q-item:hover {
      background: #26262c;
    }

    .q-item.active {
      color: #bf94ff;
      font-weight: 900;
    }

    #message-layer {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #000;
      z-index: 30;
    }

    #message-layer.show {
      display: flex;
    }

    #message-bg {
      position: absolute;
      inset: 0;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: .72;
      filter: none;
    }

    #message-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,.10), rgba(0,0,0,.72)),
        linear-gradient(to bottom, rgba(0,0,0,.18), rgba(0,0,0,.82));
    }

    #message-card {
      position: relative;
      width: min(520px, calc(100vw - 48px));
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(24,24,27,.86);
      backdrop-filter: blur(14px);
      border-radius: 16px;
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
      padding: 28px 26px;
      text-align: center;
    }

    #message-card.compact {
      width: min(420px, calc(100vw - 48px));
      padding: 24px 22px;
    }

    #message-avatar {
      width: 78px;
      height: 78px;
      border-radius: 999px;
      background: var(--purple);
      background-size: cover;
      background-position: center;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      overflow: hidden;
    }

    #message-title {
      font-size: 22px;
      line-height: 28px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    #message-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 21px;
      margin-bottom: 18px;
    }

    #message-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .secondary-btn {
      height: 36px;
      padding: 0 16px;
      border: 0;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--purple);
    }

    .primary-btn:hover {
      background: var(--purple2);
    }

    .secondary-btn {
      background: #33333a;
    }

    .secondary-btn:hover {
      background: #44444c;
    }

    #debug-box {
      position: absolute;
      left: 10px;
      bottom: 66px;
      z-index: 60;
      display: none;
      width: min(760px, calc(100vw - 20px));
      max-height: 38vh;
      overflow: auto;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.78);
      color: #e8e8ee;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #debug-box.show {
      display: block;
    }

    /* ── Micro mode: very small embedded windows (FancyMenu etc.) ── */
    @media (max-width: 400px), (max-height: 300px) {
      #topbar {
        height: 42px;
        flex-basis: 42px;
        padding: 4px 8px;
        gap: 7px;
      }

      #channel-avatar {
        width: 28px;
        height: 28px;
        flex-basis: 28px;
        font-size: 10px;
      }

      #channel-name {
        font-size: 11px;
        font-weight: 800;
        max-width: 38vw;
      }

      #channel-sub {
        font-size: 10px;
        max-width: 50vw;
      }

      #status-pill {
        font-size: 9px;
        padding: 1px 5px;
        height: 16px;
      }

      #viewer-text {
        display: none;
      }

      #topbar-right {
        gap: 5px;
      }

      #open-btn {
        height: 24px;
        padding: 0 8px;
        font-size: 11px;
        gap: 4px;
      }

      #open-btn svg {
        display: none;
      }

      #controls {
        height: 30px;
        padding: 0 8px;
        gap: 6px;
      }

      #play-btn, #mute-btn, #quality-btn, #fullscreen-btn {
        width: 24px;
        height: 24px;
      }

      #vol-slider {
        width: 40px;
      }

      #live-badge {
        font-size: 9px;
        padding: 1px 5px;
        height: 16px;
      }

      /* Offline card: shrink everything to fit tiny box */
      #message-layer {
        padding: 8px;
      }

      #message-card {
        padding: 10px 10px;
        border-radius: 8px;
        width: calc(100vw - 16px);
      }

      #message-avatar {
        width: 36px;
        height: 36px;
        font-size: 13px;
        margin-bottom: 6px;
      }

      #message-title {
        font-size: 12px;
        line-height: 16px;
        margin-bottom: 4px;
      }

      #message-text {
        font-size: 10px;
        line-height: 14px;
        margin-bottom: 8px;
      }

      #message-actions {
        gap: 6px;
      }

      .primary-btn, .secondary-btn {
        height: 26px;
        padding: 0 10px;
        font-size: 11px;
      }
    }

    @media (max-width: 720px) {
      #topbar {
        height: 54px;
        flex-basis: 54px;
        padding: 7px 10px;
      }

      #channel-avatar {
        width: 36px;
        height: 36px;
        flex-basis: 36px;
      }

      #channel-name {
        max-width: 42vw;
      }

      #channel-sub {
        max-width: 58vw;
      }

      #viewer-text {
        display: none;
      }

      #vol-slider {
        width: 56px;
      }

      #controls {
        padding-left: 10px;
        padding-right: 10px;
        gap: 8px;
      }

      #quality-btn {
        min-width: 62px;
      }

      #message-layer {
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <header id="topbar">
      <div id="channel-avatar">TW</div>

      <div id="meta">
        <div id="name-line">
          <div id="channel-name">Loading...</div>
          <div id="status-pill">OFFLINE</div>
        </div>
        <div id="channel-sub">Loading channel info...</div>
      </div>

      <div id="topbar-right">
        <div id="viewer-text">OFFLINE</div>
        <button id="open-btn" onclick="openTwitchLink(this.dataset.href)" data-href="https://twitch.tv/">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Twitch
        </button>
      </div>
    </header>

    <main id="player-wrap">
      <video id="vid" playsinline crossorigin="anonymous"></video>

      <div id="click-overlay">
        <div id="big-play">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>

      <section id="message-layer">
        <div id="message-bg"></div>
        <div id="message-card" class="compact">
          <div id="message-avatar">TW</div>
          <div id="message-title">Channel is offline</div>
          <div id="message-text">This channel is currently offline.</div>
          <div id="message-actions">
            <button class="primary-btn" id="message-retry">Refresh</button>
            <button class="secondary-btn" id="message-open" onclick="openTwitchLink(this.dataset.href)" data-href="https://twitch.tv/">Open Twitch</button>
          </div>
        </div>
      </section>

      <div id="debug-box"></div>

      <div id="controls">
        <button class="ctrl-btn" id="play-btn" title="Play/Pause">
          <svg id="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </button>

        <div id="vol-wrap">
          <button class="ctrl-btn" id="mute-btn" title="Mute">
            <svg id="vol-icon" viewBox="0 0 24 24">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <input type="range" id="vol-slider" min="0" max="100" value="80" step="1" />
        </div>

        <span id="live-badge" class="offline">OFFLINE</span>

        <div id="spacer"></div>

        <div id="quality-wrap">
          <button class="ctrl-btn" id="quality-btn">Auto ▾</button>
          <div id="quality-menu"></div>
        </div>

        <button class="ctrl-btn" id="fs-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15,3 21,3 21,9"/>
            <polyline points="9,21 3,21 3,15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);

    const CONFIG = {
      api: params.get('api') || '/api/twitch-live.json',
      requestedChannel: cleanChannel(params.get('channel') || ''),
      src: params.get('src') || '',
      proxyBase: (params.get('proxyBase') || 'https://twitch-al.nadeko.net/playlist').replace(/\/+$/, ''),
      segmentProxy: (params.get('segmentProxy') || 'https://bebraland.auuruum.me/ttvproxy').replace(/\/+$/, ''),

      autoplay: boolParam('autoplay', true),
      muted: boolParam('muted', true),
      controls: boolParam('controls', true),
      topbar: boolParam('topbar', true),
      debug: boolParam('debug', false),
      showOffline: boolParam('showOffline', true),

      // Default false: no big Twitch description paragraph on the offline card.
      showOfflineDescription: boolParam('showOfflineDescription', false),

      // For FancyMenu/embedded usage:
      // If true and Twitch API says offline, the page becomes completely empty.
      blankWhenOffline: boolParam('blankWhenOffline', false),

      // If true, HLS CDN/level errors will retry silently instead of showing the big error card.
      // Useful for FancyMenu, where a blank/quiet fallback is better than a visible error modal.
      silentStreamErrors: boolParam('silentStreamErrors', false),

      streamRetryLimit: Math.max(1, Math.floor(numberParam('streamRetryLimit', 8, 1, 50))),
      streamRetryDelayMs: Math.max(500, Math.floor(numberParam('streamRetryDelayMs', 2500, 500, 30000))),

      // Default true: if ?channel=theburntpeanut_247 but API is auurummm, API will not override the UI/offline state.
      strictApiChannel: boolParam('strictApiChannel', true),

      quality: (params.get('quality') || 'auto').toLowerCase(),
      objectFit: params.get('objectFit') || 'contain',
      volume: numberParam('volume', 0.8, 0, 1),
      infoRefreshMs: Math.max(10000, numberParam('infoRefreshMs', 30000, 10000, 600000)),

      fallbackTitle: params.get('title') || '',
      fallbackCategory: params.get('category') || '',
      forceTitle: boolParam('forceTitle', false),
      forceCategory: boolParam('forceCategory', false)
    };

    const els = {
      root: document.getElementById('root'),
      topbar: document.getElementById('topbar'),
      wrap: document.getElementById('player-wrap'),
      vid: document.getElementById('vid'),
      overlay: document.getElementById('click-overlay'),
      playBtn: document.getElementById('play-btn'),
      playIcon: document.getElementById('play-icon'),
      muteBtn: document.getElementById('mute-btn'),
      volIcon: document.getElementById('vol-icon'),
      volSlider: document.getElementById('vol-slider'),
      fsBtn: document.getElementById('fs-btn'),
      controls: document.getElementById('controls'),
      qBtn: document.getElementById('quality-btn'),
      qMenu: document.getElementById('quality-menu'),
      channelAvatar: document.getElementById('channel-avatar'),
      channelName: document.getElementById('channel-name'),
      channelSub: document.getElementById('channel-sub'),
      statusPill: document.getElementById('status-pill'),
      viewerText: document.getElementById('viewer-text'),
      openBtn: document.getElementById('open-btn'),
      liveBadge: document.getElementById('live-badge'),
      messageLayer: document.getElementById('message-layer'),
      messageBg: document.getElementById('message-bg'),
      messageCard: document.getElementById('message-card'),
      messageAvatar: document.getElementById('message-avatar'),
      messageTitle: document.getElementById('message-title'),
      messageText: document.getElementById('message-text'),
      messageRetry: document.getElementById('message-retry'),
      messageOpen: document.getElementById('message-open'),
      debugBox: document.getElementById('debug-box')
    };

    const ICONS = {
      play: '<polygon points="5,3 19,12 5,21"/>',
      pause: '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>',
      volOn: '<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>',
      volOff: '<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
    };

    let hls = null;
    let hlsStarted = false;
    let activeChannel = CONFIG.requestedChannel;
    let lastInfo = null;
    let levels = [];
    let streamRetryCount = 0;
    let retryTimer = null;

    boot();

    // Opens a URL via FancyMenu's action API (works in MCEF/FancyMenu browser),
    // falls back to window.open for regular browsers.
    function openTwitchLink(url) {
      if (!url) return;
      if (typeof fancymenu !== 'undefined' && fancymenu.actions) {
        fancymenu.actions.execute('openlink', url);
      } else {
        window.open(url, '_blank', 'noopener,noreferrer');
      }
    }

    async function boot() {
      document.body.classList.remove('blank-mode');
      els.vid.style.objectFit = normalizeObjectFit(CONFIG.objectFit);
      els.vid.volume = CONFIG.volume;
      els.vid.muted = CONFIG.muted;
      els.volSlider.value = String(Math.round(CONFIG.volume * 100));
      syncMuteIcon();

      els.topbar.classList.toggle('hidden', !CONFIG.topbar);
      els.controls.classList.toggle('hidden', !CONFIG.controls);
      els.debugBox.classList.toggle('show', CONFIG.debug);

      bindUi();

      await loadTwitchInfo({ firstLoad: true });

      setInterval(() => {
        loadTwitchInfo({ firstLoad: false });
      }, CONFIG.infoRefreshMs);
    }

    function bindUi() {
      // Block wheel/scroll events on the player so FancyMenu page scroll
      // doesn't accidentally seek the video timeline
      els.wrap.addEventListener('wheel', (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });
      els.wrap.addEventListener('scroll', (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });

      els.playBtn.addEventListener('click', togglePlay);
      els.overlay.addEventListener('click', togglePlay);

      // In embedded contexts (FancyMenu, iframe) autoplay may be blocked until
      // the first user interaction. Retry play on first click or keypress.
      if (CONFIG.autoplay) {
        const retryOnInteraction = () => {
          if (els.vid.paused && !isMessageVisible()) {
            playSmart();
          }
          document.removeEventListener('click', retryOnInteraction);
          document.removeEventListener('keydown', retryOnInteraction);
        };
        document.addEventListener('click', retryOnInteraction);
        document.addEventListener('keydown', retryOnInteraction);
      }

      els.vid.addEventListener('play', () => {
        els.playIcon.innerHTML = ICONS.pause;
        els.overlay.classList.add('hidden');
      });

      els.vid.addEventListener('pause', () => {
        els.playIcon.innerHTML = ICONS.play;
        if (!isMessageVisible()) {
          els.overlay.classList.remove('hidden');
        }
      });

      els.muteBtn.addEventListener('click', () => {
        els.vid.muted = !els.vid.muted;
        if (!els.vid.muted && els.vid.volume === 0) {
          els.vid.volume = 0.5;
          els.volSlider.value = '50';
        }
        syncMuteIcon();
      });

      els.volSlider.addEventListener('input', () => {
        const next = Number(els.volSlider.value) / 100;
        els.vid.volume = next;
        els.vid.muted = next === 0;
        syncMuteIcon();
      });

      els.qBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        els.qMenu.classList.toggle('open');
      });

      document.addEventListener('click', () => {
        els.qMenu.classList.remove('open');
      });

      els.fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          els.root.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      });

      els.messageRetry.addEventListener('click', () => {
        window.location.reload();
      });
    }

    async function loadTwitchInfo({ firstLoad }) {
      let info = null;
      let apiOk = false;

      try {
        const res = await fetch(addCacheBust(CONFIG.api), { cache: 'no-store' });

        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }

        info = await res.json();
        apiOk = true;
        lastInfo = info;
      } catch (err) {
        logDebug('API error: ' + String(err && err.message ? err.message : err));
      }

      const apiChannel = cleanChannel(info?.channel || '');
      const requested = CONFIG.requestedChannel;
      const apiMatchesRequested = !requested || !apiChannel || apiChannel === requested;
      const useApiForUi = apiOk && (!CONFIG.strictApiChannel || apiMatchesRequested);

      if (requested) {
        activeChannel = requested;
      } else if (apiChannel) {
        activeChannel = apiChannel;
      } else {
        activeChannel = 'auurummm';
      }

      if (useApiForUi) {
        applyInfoToUi(info);
      } else {
        applyFallbackUi(activeChannel, apiMatchesRequested);
      }

      updateDebug(info, {
        apiOk,
        apiChannel,
        requested,
        apiMatchesRequested,
        useApiForUi,
        activeChannel
      });

      if (useApiForUi && info && info.live === false) {
        stopHls();

        if (CONFIG.blankWhenOffline) {
          showBlankPage();
          return;
        }

        if (CONFIG.showOffline) {
          showOfflineScreen(info);
          return;
        }
      }

      hideBlankPage();
      hideMessage();

      if (firstLoad && !hlsStarted) {
        initHls();
      }
    }

    function applyInfoToUi(info) {
      const channel = cleanChannel(info?.channel || activeChannel || 'auurummm');
      const displayName = String(info?.display_name || channel || 'Twitch');
      const live = Boolean(info?.live);

      const rawGame = CONFIG.forceCategory
        ? CONFIG.fallbackCategory
        : (info?.game_name || CONFIG.fallbackCategory);

      const rawTitle = CONFIG.forceTitle
        ? CONFIG.fallbackTitle
        : (info?.title || CONFIG.fallbackTitle);

      const game = String(rawGame || '');
      const title = String(rawTitle || '');

      setAvatar(els.channelAvatar, info?.profile_image_url || '', initials(displayName));
      els.channelName.textContent = displayName;
      els.openBtn.dataset.href = 'https://twitch.tv/' + encodeURIComponent(channel);
      els.messageOpen.dataset.href = els.openBtn.dataset.href;

      if (live) {
        els.statusPill.textContent = 'LIVE';
        els.statusPill.classList.add('live');
        els.liveBadge.textContent = 'LIVE';
        els.liveBadge.classList.remove('offline');
        els.viewerText.textContent = info?.viewer_count
          ? 'LIVE • ' + Number(info.viewer_count).toLocaleString('en-US') + ' viewers'
          : 'LIVE';

        els.channelSub.textContent = joinSub(game, title) || 'Live now';
        document.title = displayName + ' - Live';
      } else {
        els.statusPill.textContent = 'OFFLINE';
        els.statusPill.classList.remove('live');
        els.liveBadge.textContent = 'OFFLINE';
        els.liveBadge.classList.add('offline');
        els.viewerText.textContent = 'OFFLINE';

        els.channelSub.textContent = 'Offline';
        document.title = displayName + ' - Offline';
      }
    }

    function applyFallbackUi(channel, apiMatchesRequested) {
      const display = channel || 'Twitch';
      const sub = apiMatchesRequested
        ? 'Loading stream info...'
        : 'Stream channel from URL; API info is for another channel';

      setAvatar(els.channelAvatar, '', initials(display));
      els.channelName.textContent = display;
      els.channelSub.textContent = sub;

      els.statusPill.textContent = 'STREAM';
      els.statusPill.classList.remove('live');

      els.liveBadge.textContent = 'LIVE';
      els.liveBadge.classList.remove('offline');
      els.viewerText.textContent = 'STREAM';

      els.openBtn.dataset.href = 'https://twitch.tv/' + encodeURIComponent(channel);
      els.messageOpen.dataset.href = els.openBtn.dataset.href;

      document.title = display + ' - Stream';
    }

    function showBlankPage() {
      document.body.classList.add('blank-mode');
      document.title = 'Offline';
      hideMessage();
    }

    function hideBlankPage() {
      document.body.classList.remove('blank-mode');
    }

    function showOfflineScreen(info) {
      const channel = cleanChannel(info?.channel || activeChannel || 'auurummm');
      const displayName = String(info?.display_name || channel || 'Twitch');

      els.messageCard.classList.toggle('compact', !CONFIG.showOfflineDescription);
      els.messageTitle.textContent = displayName + ' is offline';

      if (CONFIG.showOfflineDescription && info?.description) {
        els.messageText.textContent = 'This channel is currently offline. ' + String(info.description);
      } else {
        els.messageText.textContent = 'This channel is currently offline.';
      }

      setAvatar(els.messageAvatar, info?.profile_image_url || '', initials(displayName));

      if (info?.offline_image_url) {
        els.messageBg.style.backgroundImage = 'url("' + cssUrl(info.offline_image_url) + '")';
      } else if (info?.profile_image_url) {
        els.messageBg.style.backgroundImage = 'url("' + cssUrl(info.profile_image_url) + '")';
      } else {
        els.messageBg.style.backgroundImage = '';
      }

      els.messageOpen.dataset.href = 'https://twitch.tv/' + encodeURIComponent(channel);
      els.messageLayer.classList.add('show');
      els.overlay.classList.add('hidden');
    }

    function hideMessage() {
      els.messageLayer.classList.remove('show');
    }

    function isMessageVisible() {
      return els.messageLayer.classList.contains('show');
    }

    function initHls() {
      hlsStarted = true;
      hideMessage();

      const src = buildSource();
      if (!src) {
        showError('No channel or HLS source was provided.');
        return;
      }

      stopHls(false);

      if (window.Hls && Hls.isSupported()) {
        const DefaultLoader = Hls.DefaultConfig.loader;
        class TtvProxyLoader extends DefaultLoader {
          load(context, config, callbacks) {
            // Only proxy sub-playlist m3u8 requests (not video fragments).
            // Fragments go directly to Twitch CDN to avoid Oracle outbound traffic.
            if (context.type !== 'fragment' &&
                /(?:\.ttvnw\.net|\.live-video\.net)/.test(context.url)) {
              context.url = CONFIG.segmentProxy + '?url=' + encodeURIComponent(context.url);
            }
            super.load(context, config, callbacks);
          }
        }

        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 8,
          manifestLoadingTimeOut: 15000,
          levelLoadingTimeOut: 15000,
          fragLoadingTimeOut: 20000,
          loader: TtvProxyLoader
        });

        hls.loadSource(src);
        hls.attachMedia(els.vid);

        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          streamRetryCount = 0;
          levels = Array.isArray(data.levels) ? data.levels : [];
          buildQualityMenu();
          applyRequestedQuality();
          updateDebug(lastInfo, { hlsSrc: src, levels: levels.length });

          if (CONFIG.autoplay) {
            playSmart();
          }
        });

        hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
          syncQualityLabel(data.level);
        });

        hls.on(Hls.Events.ERROR, (_, data) => {
          console.warn('HLS error:', data);
          updateDebug(lastInfo, { hlsError: data, streamRetryCount });

          if (!data.fatal) {
            return;
          }

          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            scheduleStreamRetry(data);
            return;
          }

          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            try {
              hls.recoverMediaError();
              return;
            } catch (_) {
              scheduleStreamRetry(data);
              return;
            }
          }

          scheduleStreamRetry(data);
        });
      } else if (els.vid.canPlayType('application/vnd.apple.mpegurl')) {
        els.vid.src = src;
        els.vid.addEventListener('loadedmetadata', () => {
          if (CONFIG.autoplay) {
            playSmart();
          }
        }, { once: true });
      } else {
        showError('This browser does not support HLS playback.');
      }
    }

    function scheduleStreamRetry(data) {
      if (retryTimer) {
        return;
      }

      streamRetryCount += 1;

      const details = data?.details || 'unknown';

      if (streamRetryCount <= CONFIG.streamRetryLimit) {
        hideMessage();

        try {
          if (hls) {
            hls.destroy();
            hls = null;
          }
        } catch (_) {}

        retryTimer = window.setTimeout(() => {
          retryTimer = null;
          hlsStarted = false;
          initHls();
        }, CONFIG.streamRetryDelayMs);

        return;
      }

      if (CONFIG.silentStreamErrors) {
        showBlankPage();
        return;
      }

      showError(
        'Stream is temporarily unavailable. The HLS playlist opens, but one of the internal Twitch/CDN quality playlists returns an error (' +
        details +
        '). Try refreshing the page or using Auto quality.'
      );
    }

    function stopHls(clearVideo = true) {
      if (retryTimer) {
        clearTimeout(retryTimer);
        retryTimer = null;
      }
      if (hls) {
        try { hls.destroy(); } catch (_) {}
        hls = null;
      }

      if (clearVideo) {
        try {
          els.vid.pause();
          els.vid.removeAttribute('src');
          els.vid.load();
        } catch (_) {}
      }
    }

    function buildSource() {
      if (CONFIG.src) {
        return CONFIG.src;
      }

      if (!activeChannel) {
        return '';
      }

      return CONFIG.proxyBase + '/' + encodeURIComponent(activeChannel);
    }

    async function playSmart() {
      // Always mute first — required for autoplay in iframe/embedded contexts
      if (!els.vid.muted) {
        els.vid.muted = true;
        syncMuteIcon();
      }

      try {
        await els.vid.play();
        return; // success
      } catch (_) {}

      // Still failed even muted — show click-to-play overlay
      els.overlay.classList.remove('hidden');
    }

    function jumpToLive() {
      // Seek to live edge so resume always shows live, not buffered past content
      try {
        if (els.vid.seekable && els.vid.seekable.length > 0) {
          els.vid.currentTime = els.vid.seekable.end(els.vid.seekable.length - 1);
        } else if (els.vid.duration && isFinite(els.vid.duration)) {
          els.vid.currentTime = els.vid.duration;
        }
      } catch (_) {}
    }

    function togglePlay() {
      if (isMessageVisible()) {
        return;
      }

      if (els.vid.paused) {
        jumpToLive();
        playSmart();
      } else {
        els.vid.pause();
      }
    }

    function buildQualityMenu() {
      els.qMenu.innerHTML = '';

      addQualityItem('Auto', -1, CONFIG.quality === 'auto');

      if (!levels.length) {
        setQualityLabel('Auto');
        return;
      }

      levels.forEach((level, index) => {
        addQualityItem(qualityLabel(level, index), index, false);
      });
    }

    function addQualityItem(label, levelIndex, active) {
      const btn = document.createElement('button');
      btn.className = 'q-item' + (active ? ' active' : '');
      btn.type = 'button';
      btn.textContent = label;

      btn.addEventListener('click', () => {
        if (hls) {
          hls.currentLevel = levelIndex;
        }

        setQualityLabel(label);
        markQualityActive(label);
        els.qMenu.classList.remove('open');
      });

      els.qMenu.appendChild(btn);
    }

    function applyRequestedQuality() {
      const q = CONFIG.quality;

      if (!hls) {
        return;
      }

      if (q === 'auto') {
        hls.currentLevel = -1;
        setQualityLabel('Auto');
        markQualityActive('Auto');
        return;
      }

      if (q === 'best' || q === 'source') {
        const bestIndex = bestLevelIndex();
        if (bestIndex >= 0) {
          hls.currentLevel = bestIndex;
          const label = qualityLabel(levels[bestIndex], bestIndex);
          setQualityLabel(label);
          markQualityActive(label);
        }
        return;
      }

      const wanted = parseQuality(q);
      if (!wanted) {
        setQualityLabel('Auto');
        markQualityActive('Auto');
        hls.currentLevel = -1;
        return;
      }

      const index = findClosestLevel(wanted.height, wanted.fps);
      if (index >= 0) {
        hls.currentLevel = index;
        const label = qualityLabel(levels[index], index);
        setQualityLabel(label);
        markQualityActive(label);
      }
    }

    function syncQualityLabel(levelIndex) {
      if (!hls || hls.currentLevel === -1) {
        setQualityLabel('Auto');
        return;
      }

      const level = levels[levelIndex];
      if (level) {
        setQualityLabel(qualityLabel(level, levelIndex));
      }
    }

    function qualityLabel(level, index) {
      const h = Number(level.height || 0);
      const fpsRaw = level.attrs && level.attrs['FRAME-RATE']
        ? Number(level.attrs['FRAME-RATE'])
        : Number(level.frameRate || 0);

      const fps = fpsRaw ? Math.round(fpsRaw) : 0;

      if (h && fps >= 50) {
        return h + 'p' + fps;
      }

      if (h) {
        return h + 'p';
      }

      return 'Level ' + index;
    }

    function parseQuality(q) {
      const match = String(q).toLowerCase().match(/^(\d{3,4})p?(?:(\d{2,3}))?$/);
      if (!match) return null;

      return {
        height: Number(match[1]),
        fps: match[2] ? Number(match[2]) : 0
      };
    }

    function findClosestLevel(height, fps) {
      let best = -1;
      let bestScore = Infinity;

      levels.forEach((level, index) => {
        const h = Number(level.height || 0);
        const f = level.attrs && level.attrs['FRAME-RATE']
          ? Number(level.attrs['FRAME-RATE'])
          : Number(level.frameRate || 0);

        let score = Math.abs(h - height) * 10;

        if (fps) {
          score += Math.abs(Math.round(f || 0) - fps);
        }

        if (score < bestScore) {
          bestScore = score;
          best = index;
        }
      });

      return best;
    }

    function bestLevelIndex() {
      let best = -1;
      let bestScore = -1;

      levels.forEach((level, index) => {
        const h = Number(level.height || 0);
        const bitrate = Number(level.bitrate || 0);
        const score = h * 10000000 + bitrate;

        if (score > bestScore) {
          bestScore = score;
          best = index;
        }
      });

      return best;
    }

    function setQualityLabel(label) {
      els.qBtn.textContent = label + ' ▾';
    }

    function markQualityActive(label) {
      [...els.qMenu.querySelectorAll('.q-item')].forEach((btn) => {
        btn.classList.toggle('active', btn.textContent === label);
      });
    }

    function showError(text) {
      els.messageCard.classList.remove('compact');
      els.messageTitle.textContent = 'Stream loading error';
      els.messageText.textContent = text;
      els.messageAvatar.textContent = '!';
      els.messageAvatar.style.backgroundImage = '';
      els.messageBg.style.backgroundImage = '';
      els.messageLayer.classList.add('show');
      els.overlay.classList.add('hidden');
    }

    function syncMuteIcon() {
      els.volIcon.innerHTML = els.vid.muted || els.vid.volume === 0 ? ICONS.volOff : ICONS.volOn;
    }

    function joinSub(game, title) {
      const parts = [];
      if (game) parts.push(game);
      if (title) parts.push(title);
      return parts.join(' • ');
    }

    function setAvatar(el, url, fallbackText) {
      if (url) {
        el.textContent = '';
        el.style.backgroundImage = 'url("' + cssUrl(url) + '")';
        el.style.backgroundSize = 'cover';
        el.style.backgroundPosition = 'center';
      } else {
        el.style.backgroundImage = '';
        el.textContent = fallbackText;
      }
    }

    function initials(name) {
      const clean = String(name || 'TW').replace(/[^a-zA-Z0-9а-яА-ЯёЁ]/g, '');
      return (clean.slice(0, 2) || 'TW').toUpperCase();
    }

    function cleanChannel(value) {
      return String(value || '')
        .trim()
        .replace(/^@/, '')
        .replace(/^https?:\/\/(www\.)?twitch\.tv\//i, '')
        .split(/[/?#]/)[0]
        .toLowerCase();
    }

    function boolParam(name, fallback) {
      const raw = params.get(name);
      if (raw === null) return fallback;

      const val = raw.toLowerCase().trim();
      if (['1', 'true', 'yes', 'y', 'on'].includes(val)) return true;
      if (['0', 'false', 'no', 'n', 'off'].includes(val)) return false;

      return fallback;
    }

    function numberParam(name, fallback, min, max) {
      const raw = params.get(name);
      if (raw === null || raw === '') return fallback;

      const n = Number(raw);
      if (!Number.isFinite(n)) return fallback;

      return Math.min(max, Math.max(min, n));
    }

    function normalizeObjectFit(value) {
      return ['contain', 'cover', 'fill'].includes(value) ? value : 'contain';
    }

    function cssUrl(value) {
      return String(value).replace(/"/g, '%22');
    }

    function addCacheBust(url) {
      const sep = url.includes('?') ? '&' : '?';
      return url + sep + '_=' + Date.now();
    }

    function logDebug(text) {
      if (!CONFIG.debug) return;
      els.debugBox.textContent += text + '\n';
    }

    function updateDebug(info, extra = {}) {
      if (!CONFIG.debug) return;

      const payload = {
        api: CONFIG.api,
        requestedChannel: CONFIG.requestedChannel,
        activeChannel,
        src: buildSource(),
        quality: CONFIG.quality,
        hlsStarted,
        showOfflineDescription: CONFIG.showOfflineDescription,
        blankWhenOffline: CONFIG.blankWhenOffline,
        silentStreamErrors: CONFIG.silentStreamErrors,
        streamRetryCount,
        levels: levels.map((level, index) => ({
          index,
          label: qualityLabel(level, index),
          height: level.height,
          bitrate: level.bitrate,
          frameRate: level.frameRate || level.attrs?.['FRAME-RATE'] || null
        })),
        info,
        extra
      };

      els.debugBox.textContent = JSON.stringify(payload, null, 2);
    }
  </script>
</body>
</html>
